services:
  dukecam:
    build: .
    container_name: dukecam
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4010:4010"
    environment:
      - DATABASE_URL=postgres://trevor@postgres:5432/dukecam
      - STORAGE_PATH=/data/photos
      - THUMB_PATH=/data/thumbs
      - BASE_URL=https://dukecam.thomasduke.io
      - MAX_UPLOAD_MB=50
      - PORT=4010
      - FYXT_URL=https://open.apifyxt.com
      - FYXT_API_KEY=${FYXT_API_KEY:-}
      - FYXT_SCHEMA=thomasduke
      - PROPERTYOS_URL=http://property-dashboard:3000
      - PROPERTYOS_TOKEN=${PROPERTYOS_TOKEN:-}
    volumes:
      # Local disk ONLY — never UNAS NFS. A churny photo-serving app stalls on
      # NFS (502s + multi-minute hangs after a remount), and UNAS NFS is now
      # decommissioned on the dukecam host. Keep /data on local disk so a
      # from-repo `docker compose up` can't silently re-mount NFS. (bead claudecode-rvnp)
      - /opt/apps/dukecam/data:/data
    networks:
      - postgres-net

networks:
  postgres-net:
    external: true
    name: postgres_default
