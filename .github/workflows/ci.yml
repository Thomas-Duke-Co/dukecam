name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build · vet · govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      # Informational, not a hard gate: govulncheck runs against a live vuln DB,
      # so newly-disclosed standard-library advisories (fixed only in the latest
      # Go patch the runner may not yet have) would otherwise red every PR for
      # reasons outside this repo's control. It still surfaces advisories in the
      # logs — reachable third-party module vulns should be remediated by bumping
      # the dependency (e.g. x/image, x/net). build + vet above are the blocking
      # gates. (bead claudecode-q80d / claudecode-vb5c)
      - name: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
